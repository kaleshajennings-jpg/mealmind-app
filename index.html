    const MEAL_BG = { breakfast:"rgba(255,230,109,0.13)", lunch:"rgba(78,205,196,0.13)", dinner:"rgba(255,107,53,0.13)" };
    const MEAL_ICONS = { breakfast:"☀️", lunch:"🌤️", dinner:"🌙" };

    function ytLink(name) {
      return `https://www.youtube.com/results?search_query=${encodeURIComponent("how to make "+name+" recipe step by step")}`;
    }
    function pickMeal(type, cuisines, diets) {
      let pool = MEAL_DB[type];
      if (cuisines.length) pool = pool.filter(m => cuisines.includes(m.cuisine));
      if (diets.length)    pool = pool.filter(m => diets.every(d => m.tags.includes(d)));
      if (!pool.length)    pool = MEAL_DB[type];
      return pool[Math.floor(Math.random() * pool.length)];
    }
    function buildPlan(cuisines, diets) {
      return DAYS.reduce((p, d) => {
        p[d] = { breakfast: pickMeal("breakfast",cuisines,diets), lunch: pickMeal("lunch",cuisines,diets), dinner: pickMeal("dinner",cuisines,diets) };
        return p;
      }, {});
    }
    function buildGrocery(plan) {
      const g = {};
      Object.entries(plan).forEach(([day, meals]) =>
        Object.entries(meals).forEach(([type, meal]) => {
          if (!g[meal.name]) g[meal.name] = { items: meal.grocery, type, day };
        })
      );
      return g;
    }

    // ─── STYLES ─────────────────────────────────────────────────────────────────

    // ─── MAIN APP ───────────────────────────────────────────────────────────────
    function App() {
      const [tab,     setTab]     = useState("onboard");
      const [obStep,  setObStep]  = useState(0);
      const [diets,   setDiets]   = useState([]);
      const [cuisines,setCuisines]= useState([]);
      const [servings,setServings]= useState(4);
      const [ingr,    setIngr]    = useState("");
      const [budget,  setBudget]  = useState(120);
      const [tmax,    setTmax]    = useState(45);
      const [family,  setFamily]  = useState(false);
      const [plan,    setPlan]    = useState(null);
      const [day,     setDay]     = useState("Mon");
      const [calDay,  setCalDay]  = useState(0);
      const [grocery, setGrocery] = useState({});
      const [checked, setChecked] = useState({});
      const [gTab,    setGTab]    = useState("all");
      const [toast,   setToast]   = useState(null);
      const [loading, setLoading] = useState(false);
      const [selMeal, setSelMeal] = useState(null);
      const [saved,   setSaved]   = useState([]);

      function showToast(m){ setToast(m); setTimeout(()=>setToast(null),2100); }

      function doGen(){
        setLoading(true);
        setTimeout(()=>{
          const p=buildPlan(cuisines,diets);
          setPlan(p); setGrocery(buildGrocery(p));
          setLoading(false); setTab("home");
        },2000);
      }

      function swap(type,d){
        const m=pickMeal(type,cuisines,diets);
        setPlan(prev=>{
          const u={...prev,[d]:{...prev[d],[type]:m}};
          setGrocery(buildGrocery(u)); return u;
        });
        showToast("Meal swapped! ✨");
      }

      function toggleSave(meal){
        const already=saved.some(m=>m.id===meal.id);
        setSaved(p=>already?p.filter(m=>m.id!==meal.id):[...p,meal]);
        showToast(already?"Removed from favorites":"Saved ❤️");
      }

      const totalCal = plan&&day ? Object.values(plan[day]).reduce((s,m)=>s+m.cal,0) : 0;
      const checkedCount = Object.values(checked).filter(Boolean).length;
      const totalItems = Object.values(grocery).reduce((s,g)=>s+g.items.length,0);

      // ── ONBOARDING ──────────────────────────────────────────────────────────
      if(tab==="onboard"){
        const steps=[
          { title:<><span style={{color:"#FF6B35"}}>Dietary</span> needs</>,
            sub:"We'll filter every meal to match your lifestyle.",
            body:<div style={S.chipGrid}>
              {DIET_OPTIONS.map(d=>(
                <button key={d.id} style={{...S.chip,...(diets.includes(d.id)?S.chipSel:{})}}
                  onClick={()=>setDiets(p=>p.includes(d.id)?p.filter(x=>x!==d.id):[...p,d.id])}>{d.label}</button>
              ))}
              <button style={{...S.chip,...(diets.length===0?S.chipSel:{})}} onClick={()=>setDiets([])}>🍽️ No restrictions</button>
            </div>
          },
          { title:<><span style={{color:"#FF6B35"}}>Favorite</span> cuisines</>,
            sub:"Pick every culture you love to eat. Mix & match!",
            body:<div style={S.chipGrid}>
              {CUISINE_OPTIONS.map(c=>(
                <button key={c.id} style={{...S.chip,...(cuisines.includes(c.id)?S.chipSel:{})}}
                  onClick={()=>setCuisines(p=>p.includes(c.id)?p.filter(x=>x!==c.id):[...p,c.id])}>{c.label}</button>
              ))}
            </div>
          },
          { title:<>Cooking for <span style={{color:"#FF6B35"}}>family?</span></>,
            sub:"We'll scale portions to fit your household.",
            body:<>
              {[
                {icon:"👩", label:"Just Me",       sub:"1 person · quick meals",            val:1,fm:false},
                {icon:"👫", label:"Couple",         sub:"2 people · easy weeknight dinners", val:2,fm:false},
                {icon:"👨‍👩‍👧", label:"Small Family",  sub:"3–4 people · family-friendly",      val:4,fm:true},
                {icon:"👨‍👩‍👧‍👦", label:"Big Family",    sub:"5–6 people · big batch cooking",    val:6,fm:true},
              ].map(o=>(
                <div key={o.val} style={{...S.famPill,...(servings===o.val?S.famPillActive:{})}}
                  onClick={()=>{setServings(o.val);setFamily(o.fm);}}>
                  <span style={{fontSize:24}}>{o.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:800,fontSize:14}}>{o.label}</div>
                    <div style={{fontSize:12,color:"#8A8A9A",fontWeight:600}}>{o.sub}</div>
                  </div>
                  <div style={{...S.famPillCheck,...(servings===o.val?S.famPillCheckActive:{})}}>
                    {servings===o.val?"✓":""}
                  </div>
                </div>
              ))}
            </>
          },
          { title:<>What's in your <span style={{color:"#FF6B35"}}>fridge?</span></>,
            sub:"We'll incorporate what you already have at home.",
            body:<textarea style={S.textarea} rows={4}
              placeholder="e.g. chicken, rice, onions, garlic, canned tomatoes..."
              value={ingr} onChange={e=>setIngr(e.target.value)} />
          },
          { title:<>Time &amp; <span style={{color:"#FF6B35"}}>budget</span></>,
            sub:"We'll never suggest meals outside your limits.",
            body:<>
              <div style={{marginBottom:20}}>
                <div style={{...S.rangeRow}}><span>⏱️ Max cook time per meal</span><span style={{color:"#FF6B35"}}>{tmax} min</span></div>
                <input type="range" min={10} max={120} step={5} value={tmax}
                  onChange={e=>setTmax(+e.target.value)} style={{width:"100%",accentColor:"#FF6B35"}} />
              </div>
              <div style={{marginBottom:20}}>
                <div style={{...S.rangeRow}}><span>💰 Weekly grocery budget</span><span style={{color:"#FF6B35"}}>${budget}</span></div>
                <input type="range" min={50} max={400} step={10} value={budget}
                  onChange={e=>setBudget(+e.target.value)} style={{width:"100%",accentColor:"#FF6B35"}} />
              </div>
            </>
          },
        ];

        const s=steps[obStep], isLast=obStep===steps.length-1, pct=((obStep+1)/steps.length)*100;
        return (
          <div style={S.app}>
            {loading&&<Loader/>}
            <div style={S.statusBar}><span>9:41</span><span>●●●</span></div>
            <div style={S.obWrap}>
              <div style={S.obTop}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={S.logoIcon}>🍽️</div>
                  <span style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:18}}>MealMind</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,flex:1,margin:"0 12px"}}>
                  <div style={S.stepBar}><div style={{...S.stepFill,width:`${pct}%`}}/></div>
                  <span style={{fontSize:11,color:"#8A8A9A",fontWeight:700,whiteSpace:"nowrap"}}>{obStep+1}/{steps.length}</span>
                </div>
                <button style={{background:"none",border:"none",color:"#8A8A9A",fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer"}} onClick={doGen}>Skip</button>
              </div>
              <div style={S.obTitle}>{s.title}</div>
              <div style={S.obSub}>{s.sub}</div>
              {s.body}
              <button style={S.primaryBtn} onClick={()=>isLast?doGen():setObStep(p=>p+1)}>
                {isLast?"✨ Generate My Meal Plan!":"Continue →"}
              </button>
              {obStep>0&&<button style={S.backBtn} onClick={()=>setObStep(p=>p-1)}>← Back</button>}
            </div>
          </div>
        );
      }

      // ── MAIN SCREENS ────────────────────────────────────────────────────────
      return (
        <div style={S.app}>
          {loading&&<Loader/>}
          {toast&&<div style={S.toast}>{toast}</div>}
          {selMeal&&<MealModal meal={selMeal} onClose={()=>setSelMeal(null)}
            onSave={toggleSave} isSaved={saved.some(m=>m.id===selMeal.id)} servings={servings}/>}

          <div style={S.statusBar}><span>9:41</span><span>●●●</span></div>

          {/* HOME */}
          {tab==="home"&&(
            <div style={S.screen}>
              <div style={S.header}>
                <div style={{display:"flex",alignItems:"center"}}>
                  <div style={S.logoIcon}>🍽️</div>
                  <span style={{...S.logoText}}>MealMind</span>
                </div>
                <div style={{width:38,height:38,background:"#fff",border:"1.5px solid #EEE8E0",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,cursor:"pointer"}}>🔔</div>
              </div>
              <div style={S.hero}>
                <div style={S.heroGreet}>Good morning, {family?"Super Mom! 👩‍👧‍👦":"Chef! 👋"}</div>
                <div style={S.heroTitle}>Let's plan <span style={{color:"#FF6B35"}}>delicious</span> meals this week</div>
              </div>
              <div style={S.statsStrip}>
                {[["21","Meals Planned","#FF6B35"],[totalCal.toLocaleString(),"Today's Cal","#27AE60"],[`x${servings}`,"Servings","#F5A623"]].map(([v,l,c])=>(
                  <div key={l} style={S.statCard}><div style={{...S.statVal,color:c}}>{v}</div><div style={S.statLbl}>{l}</div></div>
                ))}
              </div>
              <div style={S.secHd}>
                <div style={S.secTitle}>📅 This Week</div>
                <div style={S.secLink} onClick={()=>setTab("calendar")}>Full View →</div>
              </div>
              <div style={S.dayTabsWrap}>
                {DAYS.map(d=>(
                  <button key={d} style={{...S.dayTab,...(day===d?S.dayTabActive:{})}} onClick={()=>setDay(d)}>{d}</button>
                ))}
              </div>
              {plan&&(
                <div style={S.cardsWrap}>
                  {MEAL_TYPES.map(type=>{
                    const meal=plan[day][type];
                    const isSaved=saved.some(m=>m.id===meal.id);
                    return(
                      <div key={type} style={S.card} onClick={()=>setSelMeal(meal)}>
                        <div style={S.cardTop}>
                          <div style={{...S.emojiBox,background:MEAL_BG[type]}}>{meal.emoji}</div>
                          <div style={S.cardBody}>
                            <div style={{...S.typeBadge,background:MEAL_BG[type],color:MEAL_COLORS[type]}}>
                              {MEAL_ICONS[type]} {type}
                            </div>
                            <div style={S.mealName}>{meal.name}</div>
                            <div style={S.metas}>
                              <span style={S.meta}>⏱ <strong>{meal.time}m</strong></span>
                              <span style={S.meta}>🔥 <strong>{meal.cal} cal</strong></span>
                              <span style={S.meta}>👥 <strong>x{servings}</strong></span>
                            </div>
                          </div>
                        </div>
                        {meal.tags.length>0&&(
                          <div style={S.dietTags}>{meal.tags.map(t=><span key={t} style={S.dietTag}>✓ {t}</span>)}</div>
                        )}
                        <div style={S.cardActions} onClick={e=>e.stopPropagation()}>
                          <button style={{...S.actBtn,background:"#FF0000",color:"#fff"}}
                            onClick={()=>window.open(ytLink(meal.name),"_blank")}>▶ Watch How to Cook</button>
                          <button style={{...S.actBtn,background:"#FFF8F0",color:"#1A1A2E",border:"1.5px solid #EEE8E0"}}
                            onClick={()=>swap(type,day)}>🔄 Swap</button>
                          <button style={{...S.actBtn,background:"#FFF8F0",color:"#FF6B35",border:"1.5px solid #EEE8E0"}}
                            onClick={()=>toggleSave(meal)}>{isSaved?"❤️":"🤍"}</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
              <button style={S.surpriseBtn} onClick={()=>{
                setLoading(true);
                setTimeout(()=>{const p=buildPlan(cuisines,diets);setPlan(p);setGrocery(buildGrocery(p));setLoading(false);showToast("New plan generated! 🎉");},1500);
              }}>🎲 Surprise Me! Regenerate Whole Plan</button>
            </div>
          )}

          {/* CALENDAR */}
          {tab==="calendar"&&(
            <div style={S.screen}>
              <div style={S.header}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:800}}>📅 Weekly Calendar</div>
                <button style={{background:"none",border:"none",color:"#FF6B35",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}
                  onClick={()=>{setLoading(true);setTimeout(()=>{const p=buildPlan(cuisines,diets);setPlan(p);setGrocery(buildGrocery(p));setLoading(false);showToast("Plan regenerated! 🎉");},1500);}}>
                  🔄 Regenerate
                </button>
              </div>
              <div style={{padding:"0 20px"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:5,marginBottom:16}}>
                  {DAYS.map((d,i)=>(
                    <div key={d} style={{textAlign:"center"}}>
                      <div style={{fontSize:9,color:"#8A8A9A",fontWeight:800,textTransform:"uppercase",marginBottom:5}}>{d}</div>
                      <div style={{width:34,height:34,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,margin:"0 auto",cursor:"pointer",background:calDay===i?"#FF6B35":"#fff",color:calDay===i?"#fff":"#1A1A2E",border:`1.5px solid ${calDay===i?"#FF6B35":"#EEE8E0"}`}}
                        onClick={()=>{setCalDay(i);setDay(d);}}>
                        {7+i}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:16,marginBottom:13}}>
                  {FULL_DAYS[calDay]}, April {7+calDay}
                </div>
                {plan&&MEAL_TYPES.map(type=>{
                  const meal=plan[DAYS[calDay]][type];
                  return(
                    <div key={type} style={{display:"flex",alignItems:"center",gap:11,background:"#fff",border:"1.5px solid #EEE8E0",borderRadius:15,padding:"11px 13px",marginBottom:8,cursor:"pointer"}}
                      onClick={()=>setSelMeal(meal)}>
                      <div style={{fontSize:22}}>{meal.emoji}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:1,color:"#8A8A9A",fontWeight:800}}>{type}</div>
                        <div style={{fontWeight:800,fontSize:14}}>{meal.name}</div>
                      </div>
                      <button style={{background:"#FF0000",color:"#fff",border:"none",borderRadius:9,padding:"6px 11px",fontSize:11,fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}
                        onClick={e=>{e.stopPropagation();window.open(ytLink(meal.name),"_blank");}}>▶ Watch</button>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* GROCERY */}
          {tab==="grocery"&&(
            <div style={S.screen}>
              <div style={S.grocHdr}>
                <div style={S.grocTitle}>🛒 Grocery List</div>
                <div style={S.grocSub}>{totalItems} ingredients · {checkedCount} checked · est. ${Math.round(budget*0.8)}</div>
              </div>
              <button style={S.delivBtn} onClick={()=>showToast("Opening grocery delivery... 🚚")}>
                🚚 Order via Grocery Delivery
              </button>
              <div style={S.grocTabs}>
                <button style={{...S.grocTab,...(gTab==="all"?S.grocTabActive:{})}} onClick={()=>setGTab("all")}>All Meals</button>
                {Object.keys(grocery).map(n=>(
                  <button key={n} style={{...S.grocTab,...(gTab===n?S.grocTabActive:{})}} onClick={()=>setGTab(n)}>
                    {n.split(" ").slice(0,2).join(" ")}
                  </button>
                ))}
              </div>
              <div style={S.grocSection}>
                {Object.entries(grocery).filter(([n])=>gTab==="all"||gTab===n).map(([mealName,info])=>(
                  <div key={mealName}>
                    <div style={S.mealSecHd}>
                      <span style={{fontSize:20}}>{info.type==="breakfast"?"☀️":info.type==="lunch"?"🌤️":"🌙"}</span>
                      <div>
                        <div style={{fontSize:14,fontWeight:800}}>{mealName}</div>
                        <div style={{fontSize:11,color:"#8A8A9A",fontWeight:600}}>{info.type} · {info.day} · {servings} servings</div>
                      </div>
                    </div>
                    {info.items.map(item=>{
                      const k=`${mealName}__${item}`;
                      return(
                        <div key={k} style={S.grocItem} onClick={()=>setChecked(p=>({...p,[k]:!p[k]}))}>
                          <div style={{...S.gcheck,...(checked[k]?S.gcheckDone:{})}}>
                            {checked[k]&&<span style={{fontSize:11,color:"#fff"}}>✓</span>}
                          </div>
                          <span style={{fontSize:13,fontWeight:600,textDecoration:checked[k]?"line-through":"none",color:checked[k]?"#8A8A9A":"#1A1A2E",lineHeight:1.4}}>{item}</span>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* PROFILE */}
          {tab==="profile"&&(
            <div style={S.screen}>
              <div style={S.profHero}>
                <div style={S.profAv}>👩‍🍳</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:800}}>My Kitchen</div>
                <div style={{color:"#8A8A9A",fontSize:13,fontWeight:600,marginTop:3}}>7-day streak 🔥 · {saved.length} saved · {servings} servings</div>
              </div>
              {[
                {icon:"🥗",label:"Dietary Preferences",val:diets.length?diets.join(", "):"No restrictions"},
                {icon:"🌍",label:"Favorite Cuisines",val:cuisines.length?cuisines.join(", "):"All cuisines"},
                {icon:"👨‍👩‍👧",label:"Family Size",val:`${servings} ${servings===1?"person":"people"}${family?" · Family Mode ON":""}`},
                {icon:"⏱️",label:"Max Cook Time",val:`${tmax} minutes per meal`},
                {icon:"💰",label:"Weekly Budget",val:`$${budget}/week`},
                {icon:"❤️",label:"Saved Meals",val:`${saved.length} meals`},
                {icon:"🔔",label:"Meal Prep Reminders",val:"8:00 AM daily"},
                {icon:"📊",label:"Nutrition Goal",val:`~${totalCal||2000} cal/day`},
              ].map(r=>(
                <div key={r.label} style={S.prefRow}>
                  <span style={{fontSize:20,width:28,textAlign:"center"}}>{r.icon}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700}}>{r.label}</div>
                    <div style={{fontSize:12,color:"#8A8A9A",fontWeight:600,marginTop:1}}>{r.val}</div>
                  </div>
                  <span style={{color:"#8A8A9A",fontSize:16}}>›</span>
                </div>
              ))}
              <div style={{padding:"0 20px",marginTop:16}}>
                <button style={S.primaryBtn} onClick={()=>{setTab("onboard");setObStep(0);}}>✏️ Update My Preferences</button>
              </div>
            </div>
          )}

          {/* BOTTOM NAV */}
          <div style={S.bottomNav}>
            {[["home","🏠","Home"],["calendar","📅","Plan"],["grocery","🛒","Grocery"],["profile","👩‍🍳","Profile"]].map(([id,icon,label])=>(
              <div key={id} style={S.navItem} onClick={()=>setTab(id)}>
                <span style={S.navIcon}>{icon}</span>
                <span style={{...S.navLabel,color:tab===id?"#FF6B35":"#8A8A9A"}}>{label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── MEAL MODAL ─────────────────────────────────────────────────────────────
    function MealModal({meal,onClose,onSave,isSaved,servings}){
      return(
        <div style={S.overlay} onClick={onClose}>
          <div style={S.sheet} onClick={e=>e.stopPropagation()}>
            <div style={S.handle}/>
            <div style={{textAlign:"center",padding:"18px 20px 0",fontSize:60}}>{meal.emoji}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:800,textAlign:"center",padding:"8px 20px 0"}}>{meal.name}</div>
            <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:6,padding:"10px 20px 0"}}>
              {meal.tags.map(t=>(
                <span key={t} style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:10,background:"rgba(255,107,53,0.1)",color:"#FF6B35"}}>{t}</span>
              ))}
              <span style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:10,background:"rgba(52,152,219,0.1)",color:"#3498DB"}}>{meal.cuisine}</span>
            </div>
            <div style={{display:"flex",gap:10,padding:"14px 20px"}}>
              {[["⏱️",`${meal.time}m`,"Cook Time"],["🔥",meal.cal,"Calories"],["👥",`x${servings}`,"Servings"]].map(([ico,v,l])=>(
                <div key={l} style={S.mstat}>
                  <div style={{fontSize:18,fontWeight:800,color:"#FF6B35"}}>{v}</div>
                  <div style={{fontSize:10,color:"#8A8A9A",fontWeight:700,marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:16,fontWeight:800,padding:"16px 20px 8px"}}>🛒 Ingredients (for {servings} servings)</div>
            {meal.grocery.map((item,i)=>(
              <div key={i} style={S.ingItem}>
                <div style={S.ingDot}/>
                <span style={{fontSize:13,fontWeight:600}}>{item}</span>
              </div>
            ))}
            <button style={S.watchBtn} onClick={()=>window.open(ytLink(meal.name),"_blank")}>
              ▶ Watch How to Make {meal.name} on YouTube
            </button>
            <button style={{...S.watchBtn,background:"#FF6B35",boxShadow:"0 3px 14px rgba(255,107,53,0.3)",marginTop:8}}
              onClick={()=>onSave(meal)}>
              {isSaved?"❤️ Saved to Favorites":"🤍 Save to Favorites"}
            </button>
            <button style={{margin:"10px 20px 0",background:"#FFF8F0",border:"2px solid #EEE8E0",borderRadius:15,padding:13,color:"#1A1A2E",fontFamily:"'Nunito',sans-serif",fontSize:14,fontWeight:800,cursor:"pointer",width:"calc(100% - 40px)"}}
              onClick={onClose}>← Back to Meals</button>
          </div>
        </div>
      );
    }

    // ─── LOADER ─────────────────────────────────────────────────────────────────
    function Loader(){
      const msgs=["Picking your meals...","Matching your cuisines...","Building grocery list...","Almost ready! 🎉"];
      const [msg,setMsg]=useState(msgs[0]);
      useEffect(()=>{
        let i=0; const t=setInterval(()=>{i=(i+1)%msgs.length;setMsg(msgs[i]);},600);
        return()=>clearInterval(t);
      },[]);

      return(
        <div style={S.loaderOverlay}>
          <div style={{fontSize:52}}>🍽️</div>
          <div style={{...S.spinner,animation:"spin 0.8s linear infinite"}}/>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:800,textAlign:"center"}}>{msg}</div>
          <div style={{color:"#8A8A9A",fontSize:13,fontWeight:600,textAlign:"center"}}>Personalizing your family's<br/>perfect weekly meal plan</div>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      );
    }

    // ─── MOUNT ──────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
